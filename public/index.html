<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票关系图谱</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel">
        <h1>股票关系图谱</h1>
        <p class="hint">输入股票名称或代码，AI 生成可点击扩展的公司关系网络。</p>

        <label>模型提供商</label>
        <select id="modelName">
          <option value="deepseek">DeepSeek</option>
        </select>

        <label>API Base URL (可选)</label>
        <input id="apiBaseUrl" placeholder="默认: https://api.deepseek.com" />

        <label>API Key</label>
        <input id="apiKey" type="password" placeholder="输入你的 API Key" />

        <label>股票名称/代码</label>
        <input id="centerEntity" placeholder="如: 英伟达 / NVDA / NVIDIA" />

        <button id="buildBtn">生成图谱</button>
        <button id="clearBtn" class="secondary">清空画布</button>

        <div class="tips">
          <strong>操作说明</strong>
          <ul>
            <li>拖动画布可平移</li>
            <li>滚轮缩放</li>
            <li>点击公司节点可继续围绕该公司扩展</li>
          </ul>
        </div>

        <div id="status" class="status">等待输入...</div>
      </aside>

      <main class="graph-wrap">
        <svg id="graphSvg" viewBox="0 0 1400 900">
          <g id="viewport">
            <g id="edges"></g>
            <g id="edgeLabels"></g>
            <g id="nodes"></g>
          </g>
        </svg>
      </main>
    </div>

    <script src="/public/app.js"></script>
  </body>
  </html>
