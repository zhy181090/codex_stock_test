<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票深层垄断关系图谱</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel">
        <h1>股票深层垄断关系图谱</h1>
        <p class="hint">关系线仅显示层级，点击 L1/L2/L3/L4 查看详细关系。</p>

        <label>模型提供商</label>
        <select id="modelName">
          <option value="deepseek">DeepSeek</option>
        </select>

        <label>API Base URL（可选）</label>
        <input id="apiBaseUrl" placeholder="默认: https://api.deepseek.com/v1" />

        <label>API Key（可选）</label>
        <input id="apiKey" type="password" placeholder="已配置服务端密钥可留空" />

        <label>Tavily API Key（可选）</label>
        <input id="tavilyApiKey" type="password" placeholder="用于搜索增强，可留空" />

        <label>股票名称/代码</label>
        <input id="centerEntity" placeholder="例如：英伟达 / NVDA / NVIDIA" />

        <div class="actions">
          <button id="buildBtn">生成图谱</button>
          <button id="backBtn" class="secondary">返回上一步</button>
          <button id="refreshBtn" class="secondary">刷新当前</button>
          <button id="clearBtn" class="secondary">清空画布</button>
        </div>

        <div id="status" class="status">等待输入...</div>
      </aside>

      <section class="content">
        <main class="graph-wrap">
          <div class="legend" id="legend">
            <span class="legend-note">箭头指向被动方</span>
            <span><i class="swatch red"></i>刚需垄断</span>
            <span><i class="swatch green"></i>技术壁垒</span>
            <span><i class="swatch yellow"></i>国产替代</span>
            <span><i class="swatch blue"></i>缺货催化</span>
          </div>
          <svg id="graphSvg" viewBox="0 0 1600 980">
            <defs id="lineDefs"></defs>
            <g id="viewport">
              <g id="edges"></g>
              <g id="edgeLabels"></g>
              <g id="nodes"></g>
              <g id="overlays"></g>
            </g>
          </svg>
        </main>

        <section class="news-wrap">
          <div class="analysis-block">
            <h2>半年股价变化原因（AI）</h2>
            <div id="halfYearReason" class="commentary">暂无分析</div>
          </div>

          <div class="analysis-block">
            <h2>股性评分与未来预测</h2>
            <div id="scoreBoard" class="score-board">
              <div class="score-item"><span>技术路线绕不开</span><b id="scoreRoute">-</b></div>
              <div class="score-item"><span>全球少数公司能做</span><b id="scoreOligopoly">-</b></div>
              <div class="score-item"><span>市值与卡位规模错配</span><b id="scoreMismatch">-</b></div>
              <div class="score-item total"><span>总分</span><b id="scoreTotal">-</b></div>
            </div>
            <div id="scoreBrief" class="commentary">暂无评分解读</div>
            <div id="forecastText" class="commentary">暂无未来预测</div>
          </div>

          <div class="news-header">
            <h2>近期新闻与AI解读</h2>
            <span id="newsTag" class="news-tag">未加载</span>
          </div>
          <div id="newsCommentary" class="commentary">暂无解读</div>
          <ul id="newsList" class="news-list"></ul>
        </section>
      </section>
    </div>

    <script src="/public/app.js"></script>
  </body>
  </html>
